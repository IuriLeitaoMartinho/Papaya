<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#6C63B5">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>KidTrack</title>
<style>
  :root {
    --bg: #FAF6F0; --card: #FFFFFF; --ink: #2B2733; --muted: #8A8494;
    --line: #ECE6DD;
    --feed: #E09E3E; --sleep: #6C63B5; --diaper: #5FA88F;
    --growth: #D96C6C; --milestone: #C9A227;
    --radius: 16px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1E1B26; --card: #2A2635; --ink: #EDEAF2; --muted: #9A93A8;
      --line: #3A3547;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--ink);
    padding-bottom: calc(96px + env(safe-area-inset-bottom));
    -webkit-tap-highlight-color: transparent;
  }
  header {
    padding: 20px 20px 8px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
  header .age { color: var(--muted); font-size: 14px; }
  header button {
    background: none; border: none; color: var(--muted);
    font-size: 20px; cursor: pointer; padding: 4px;
  }

  /* Since-strip: the live counters */
  .since {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
    padding: 8px 16px 4px;
  }
  .since .cell {
    background: var(--card); border-radius: var(--radius);
    padding: 12px 10px; text-align: center;
    border-top: 3px solid var(--c);
  }
  .since .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .since .val { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 2px; }

  nav.tabs {
    display: flex; gap: 4px; padding: 12px 16px 4px;
  }
  nav.tabs button {
    flex: 1; padding: 9px 0; border: none; border-radius: 999px;
    background: none; color: var(--muted); font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  nav.tabs button.active { background: var(--card); color: var(--ink); }

  main { padding: 8px 16px; }
  .empty { color: var(--muted); text-align: center; padding: 40px 20px; font-size: 15px; line-height: 1.5; }

  .entry {
    background: var(--card); border-radius: var(--radius);
    padding: 12px 14px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
  }
  .entry .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .entry .body { flex: 1; min-width: 0; }
  .entry .title { font-weight: 600; font-size: 15px; }
  .entry .sub { color: var(--muted); font-size: 13px; margin-top: 1px; }
  .entry .time { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }
  .daysep { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; margin: 16px 4px 8px; }

  /* Quick-log thumb bar */
  .quickbar {
    position: fixed; left: 0; right: 0; bottom: 0;
    padding: 10px 12px calc(12px + env(safe-area-inset-bottom));
    background: var(--bg);
    border-top: 1px solid var(--line);
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px;
  }
  .quickbar button {
    border: none; border-radius: var(--radius);
    padding: 14px 4px 12px; cursor: pointer;
    color: #fff; font-weight: 700; font-size: 14px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .quickbar .icon { font-size: 22px; }
  .qb-feed { background: var(--feed); }
  .qb-sleep { background: var(--sleep); }
  .qb-diaper { background: var(--diaper); }
  .qb-more { background: var(--card); color: var(--ink); border: 1px solid var(--line); }

  /* Bottom sheet */
  .sheet-back {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: none; z-index: 10;
  }
  .sheet-back.open { display: block; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 11;
    background: var(--card); border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    transform: translateY(105%); transition: transform 0.22s ease;
    max-height: 85vh; overflow-y: auto;
  }
  @media (prefers-reduced-motion: reduce) { .sheet { transition: none; } }
  .sheet.open { transform: translateY(0); }
  .sheet h2 { font-size: 18px; margin-bottom: 14px; }
  .sheet label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 5px; }
  .sheet input[type="text"], .sheet input[type="number"],
  .sheet input[type="datetime-local"], .sheet input[type="date"], .sheet textarea {
    width: 100%; padding: 11px 12px; font-size: 16px;
    border: 1px solid var(--line); border-radius: 10px;
    background: var(--bg); color: var(--ink);
  }
  .segs { display: flex; gap: 8px; }
  .segs button {
    flex: 1; padding: 11px 4px; border: 1px solid var(--line); border-radius: 10px;
    background: var(--bg); color: var(--ink); font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .segs button.sel { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .sheet .actions { display: flex; gap: 10px; margin-top: 20px; }
  .sheet .actions button {
    flex: 1; padding: 14px; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700; cursor: pointer;
  }
  .btn-save { background: var(--sleep); color: #fff; }
  .btn-cancel { background: var(--bg); color: var(--ink); border: 1px solid var(--line) !important; }
  .btn-delete { background: none; border: none; color: var(--growth); font-size: 14px; font-weight: 600; margin-top: 14px; cursor: pointer; width: 100%; }

  /* Growth chart */
  .chart-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .chart-card h3 { font-size: 14px; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
  svg text { fill: var(--muted); font-size: 10px; font-family: inherit; }

  .settings-row { display: flex; gap: 10px; margin-top: 16px; }
  .settings-row button {
    flex: 1; padding: 12px; border: 1px solid var(--line); border-radius: 10px;
    background: var(--bg); color: var(--ink); font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button:focus-visible, input:focus-visible { outline: 2px solid var(--sleep); outline-offset: 2px; }
</style>
</head>
<body>

<header>
  <div>
    <h1 id="babyName">KidTrack</h1>
    <div class="age" id="babyAge"></div>
  </div>
  <button id="settingsBtn" aria-label="Settings">⚙</button>
</header>

<div class="since">
  <div class="cell" style="--c: var(--feed)"><div class="label">Last feed</div><div class="val" id="sinceFeed">—</div></div>
  <div class="cell" style="--c: var(--sleep)"><div class="label">Sleep</div><div class="val" id="sinceSleep">—</div></div>
  <div class="cell" style="--c: var(--diaper)"><div class="label">Last diaper</div><div class="val" id="sinceDiaper">—</div></div>
</div>

<nav class="tabs">
  <button data-tab="log" class="active">Log</button>
  <button data-tab="growth">Growth</button>
  <button data-tab="milestones">Milestones</button>
</nav>

<main id="main"></main>

<div class="quickbar">
  <button class="qb-feed" id="qbFeed"><span class="icon">🍼</span>Feed</button>
  <button class="qb-sleep" id="qbSleep"><span class="icon">🌙</span><span id="qbSleepLabel">Sleep</span></button>
  <button class="qb-diaper" id="qbDiaper"><span class="icon">🧷</span>Diaper</button>
  <button class="qb-more" id="qbMore"><span class="icon">＋</span>More</button>
</div>

<div class="sheet-back" id="sheetBack"></div>
<div class="sheet" id="sheet"></div>

<script>
'use strict';
// ---------- storage ----------
const load = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } };
const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));
let entries = load('kidtrack.entries', []);   // {id, type, time, ...}
let settings = load('kidtrack.settings', { name: '', birthdate: '' });
const persist = () => { save('kidtrack.entries', entries); render(); };
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

// ---------- helpers ----------
const $ = s => document.querySelector(s);
const fmtTime = iso => new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
const fmtDay = iso => {
  const d = new Date(iso), today = new Date(); 
  const yd = new Date(today); yd.setDate(yd.getDate() - 1);
  if (d.toDateString() === today.toDateString()) return 'Today';
  if (d.toDateString() === yd.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], { weekday: 'short', day: 'numeric', month: 'short' });
};
const ago = iso => {
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1) return 'now';
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ' + (m % 60) + 'm';
  return Math.floor(h / 24) + 'd';
};
const dur = (a, b) => {
  const m = Math.max(0, Math.round((new Date(b) - new Date(a)) / 60000));
  const h = Math.floor(m / 60);
  return h ? `${h}h ${m % 60}m` : `${m}m`;
};
const toLocalInput = iso => {
  const d = new Date(iso);
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 16);
};
const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const META = {
  feed:      { color: 'var(--feed)',      name: 'Feed' },
  sleep:     { color: 'var(--sleep)',     name: 'Sleep' },
  diaper:    { color: 'var(--diaper)',    name: 'Diaper' },
  growth:    { color: 'var(--growth)',    name: 'Growth' },
  milestone: { color: 'var(--milestone)', name: 'Milestone' },
};

function entryDesc(e) {
  switch (e.type) {
    case 'feed': {
      const bits = [];
      if (e.method) bits.push(e.method === 'breast' ? 'Breast' + (e.side ? ' · ' + e.side : '') : (e.method === 'bottle' ? 'Bottle' : 'Solid'));
      if (e.amountMl) bits.push(e.amountMl + ' ml');
      return bits.join(' · ') || '';
    }
    case 'sleep': return e.end ? dur(e.time, e.end) : 'ongoing…';
    case 'diaper': return { wet: 'Wet', dirty: 'Dirty', both: 'Wet + dirty' }[e.kind] || '';
    case 'growth': return [e.weightKg && e.weightKg + ' kg', e.heightCm && e.heightCm + ' cm'].filter(Boolean).join(' · ');
    case 'milestone': return e.text || '';
  }
  return '';
}

const openSleep = () => entries.find(e => e.type === 'sleep' && !e.end);

// ---------- rendering ----------
let tab = 'log';

function render() {
  renderHeader(); renderSince(); renderMain();
  $('#qbSleepLabel').textContent = openSleep() ? 'Wake up' : 'Sleep';
}

function renderHeader() {
  $('#babyName').textContent = settings.name || 'KidTrack';
  let t = '';
  if (settings.birthdate) {
    const days = Math.floor((Date.now() - new Date(settings.birthdate)) / 86400000);
    if (days < 0) { t = 'arriving soon'; }
    else if (days < 60) t = days + ' days old';
    else if (days < 365 * 2) t = Math.floor(days / 30.44) + ' months old';
    else t = Math.floor(days / 365.25) + ' years old';
  }
  $('#babyAge').textContent = t;
}

function renderSince() {
  const lastFeed = entries.filter(e => e.type === 'feed').sort((a, b) => b.time.localeCompare(a.time))[0];
  const lastDiaper = entries.filter(e => e.type === 'diaper').sort((a, b) => b.time.localeCompare(a.time))[0];
  const sl = openSleep();
  const lastSleep = entries.filter(e => e.type === 'sleep' && e.end).sort((a, b) => b.end.localeCompare(a.end))[0];
  $('#sinceFeed').textContent = lastFeed ? ago(lastFeed.time) : '—';
  $('#sinceDiaper').textContent = lastDiaper ? ago(lastDiaper.time) : '—';
  $('#sinceSleep').textContent = sl ? '😴 ' + ago(sl.time) : (lastSleep ? 'awake ' + ago(lastSleep.end) : '—');
}

function renderMain() {
  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  const main = $('#main');
  let list;
  if (tab === 'log') list = entries.filter(e => ['feed', 'sleep', 'diaper'].includes(e.type));
  else if (tab === 'growth') list = entries.filter(e => e.type === 'growth');
  else list = entries.filter(e => e.type === 'milestone');

  list = [...list].sort((a, b) => b.time.localeCompare(a.time));
  let html = '';

  if (tab === 'growth' && list.length >= 2) html += growthChart(list);

  if (!list.length) {
    const msgs = {
      log: 'Nothing logged yet.<br>Tap a button below to log the first feed, sleep or diaper.',
      growth: 'No measurements yet.<br>Tap ＋ More to add weight or height.',
      milestones: 'No milestones yet.<br>Tap ＋ More to record the first one.'
    };
    html += `<div class="empty">${msgs[tab]}</div>`;
  } else {
    let day = '';
    for (const e of list) {
      const d = fmtDay(e.time);
      if (d !== day) { html += `<div class="daysep">${d}</div>`; day = d; }
      const m = META[e.type];
      html += `<div class="entry" data-id="${e.id}" role="button" tabindex="0">
        <span class="dot" style="background:${m.color}"></span>
        <span class="body">
          <div class="title">${m.name}</div>
          <div class="sub">${escapeHtml(entryDesc(e))}</div>
        </span>
        <span class="time">${fmtTime(e.time)}</span>
      </div>`;
    }
  }
  main.innerHTML = html;
  main.querySelectorAll('.entry').forEach(el => {
    el.addEventListener('click', () => openEdit(el.dataset.id));
    el.addEventListener('keydown', ev => { if (ev.key === 'Enter') openEdit(el.dataset.id); });
  });
}

function growthChart(list) {
  const pts = list.filter(e => e.weightKg).sort((a, b) => a.time.localeCompare(b.time));
  if (pts.length < 2) return '';
  const W = 320, H = 140, P = 28;
  const xs = pts.map(p => new Date(p.time).getTime());
  const ys = pts.map(p => +p.weightKg);
  const x0 = Math.min(...xs), x1 = Math.max(...xs);
  const y0 = Math.min(...ys), y1 = Math.max(...ys);
  const X = t => P + (W - 2 * P) * (x1 === x0 ? 0.5 : (t - x0) / (x1 - x0));
  const Y = v => H - P + (2 * P - H) * (y1 === y0 ? 0.5 : (v - y0) / (y1 - y0));
  const path = pts.map((p, i) => (i ? 'L' : 'M') + X(xs[i]).toFixed(1) + ',' + Y(ys[i]).toFixed(1)).join(' ');
  const dots = pts.map((p, i) => `<circle cx="${X(xs[i]).toFixed(1)}" cy="${Y(ys[i]).toFixed(1)}" r="3.5" fill="var(--growth)"/>`).join('');
  return `<div class="chart-card"><h3>Weight (kg)</h3>
    <svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="Weight chart">
      <text x="${P}" y="${Y(y1) - 8}">${y1}</text>
      <text x="${P}" y="${Y(y0) + 14}">${y0}</text>
      <path d="${path}" fill="none" stroke="var(--growth)" stroke-width="2.5" stroke-linecap="round"/>
      ${dots}
    </svg></div>`;
}

// ---------- sheets ----------
const sheet = $('#sheet'), back = $('#sheetBack');
function openSheet(html) { sheet.innerHTML = html; sheet.classList.add('open'); back.classList.add('open'); }
function closeSheet() { sheet.classList.remove('open'); back.classList.remove('open'); }
back.addEventListener('click', closeSheet);

function segControl(id, options, selected) {
  return `<div class="segs" id="${id}">` + options.map(o =>
    `<button type="button" data-v="${o.v}" class="${o.v === selected ? 'sel' : ''}">${o.l}</button>`).join('') + '</div>';
}
function segVal(id) { const b = document.querySelector(`#${id} .sel`); return b ? b.dataset.v : null; }
function wireSegs(root) {
  root.querySelectorAll('.segs').forEach(g =>
    g.querySelectorAll('button').forEach(b =>
      b.addEventListener('click', () => {
        g.querySelectorAll('button').forEach(x => x.classList.remove('sel'));
        b.classList.add('sel');
      })));
}

function sheetActions(saveLabel) {
  return `<div class="actions">
    <button type="button" class="btn-cancel" id="shCancel">Cancel</button>
    <button type="button" class="btn-save" id="shSave">${saveLabel}</button>
  </div>`;
}

// -- Feed
function feedSheet(e) {
  openSheet(`<h2>${e ? 'Edit feed' : 'Log feed'}</h2>
    <label>Type</label>
    ${segControl('fMethod', [{v:'bottle',l:'Bottle'},{v:'breast',l:'Breast'},{v:'solid',l:'Solid'}], e?.method || 'bottle')}
    <label>Side (breast)</label>
    ${segControl('fSide', [{v:'left',l:'Left'},{v:'right',l:'Right'},{v:'both',l:'Both'}], e?.side || 'left')}
    <label>Amount (ml, optional)</label>
    <input type="number" id="fAmount" inputmode="numeric" value="${e?.amountMl ?? ''}" placeholder="e.g. 120">
    <label>Time</label>
    <input type="datetime-local" id="fTime" value="${toLocalInput(e?.time || new Date().toISOString())}">
    ${sheetActions(e ? 'Save changes' : 'Log feed')}
    ${e ? '<button type="button" class="btn-delete" id="shDelete">Delete entry</button>' : ''}`);
  wireSegs(sheet);
  $('#shSave').onclick = () => {
    const obj = e || { id: uid(), type: 'feed' };
    obj.method = segVal('fMethod');
    obj.side = obj.method === 'breast' ? segVal('fSide') : undefined;
    obj.amountMl = $('#fAmount').value ? +$('#fAmount').value : undefined;
    obj.time = new Date($('#fTime').value).toISOString();
    if (!e) entries.push(obj);
    closeSheet(); persist();
  };
  wireCancelDelete(e);
}

// -- Sleep
function sleepSheet(e) {
  openSheet(`<h2>${e ? 'Edit sleep' : 'Log sleep'}</h2>
    <label>Fell asleep</label>
    <input type="datetime-local" id="sStart" value="${toLocalInput(e?.time || new Date().toISOString())}">
    <label>Woke up (leave empty if still sleeping)</label>
    <input type="datetime-local" id="sEnd" value="${e?.end ? toLocalInput(e.end) : ''}">
    ${sheetActions(e ? 'Save changes' : 'Log sleep')}
    ${e ? '<button type="button" class="btn-delete" id="shDelete">Delete entry</button>' : ''}`);
  $('#shSave').onclick = () => {
    const obj = e || { id: uid(), type: 'sleep' };
    obj.time = new Date($('#sStart').value).toISOString();
    obj.end = $('#sEnd').value ? new Date($('#sEnd').value).toISOString() : undefined;
    if (!e) entries.push(obj);
    closeSheet(); persist();
  };
  wireCancelDelete(e);
}

// -- Diaper
function diaperSheet(e) {
  openSheet(`<h2>${e ? 'Edit diaper' : 'Log diaper'}</h2>
    <label>What happened</label>
    ${segControl('dKind', [{v:'wet',l:'Wet'},{v:'dirty',l:'Dirty'},{v:'both',l:'Both'}], e?.kind || 'wet')}
    <label>Time</label>
    <input type="datetime-local" id="dTime" value="${toLocalInput(e?.time || new Date().toISOString())}">
    ${sheetActions(e ? 'Save changes' : 'Log diaper')}
    ${e ? '<button type="button" class="btn-delete" id="shDelete">Delete entry</button>' : ''}`);
  wireSegs(sheet);
  $('#shSave').onclick = () => {
    const obj = e || { id: uid(), type: 'diaper' };
    obj.kind = segVal('dKind');
    obj.time = new Date($('#dTime').value).toISOString();
    if (!e) entries.push(obj);
    closeSheet(); persist();
  };
  wireCancelDelete(e);
}

// -- Growth
function growthSheet(e) {
  openSheet(`<h2>${e ? 'Edit measurement' : 'Add measurement'}</h2>
    <label>Weight (kg)</label>
    <input type="number" step="0.01" id="gW" inputmode="decimal" value="${e?.weightKg ?? ''}" placeholder="e.g. 4.35">
    <label>Height (cm)</label>
    <input type="number" step="0.1" id="gH" inputmode="decimal" value="${e?.heightCm ?? ''}" placeholder="e.g. 54.5">
    <label>Date</label>
    <input type="datetime-local" id="gTime" value="${toLocalInput(e?.time || new Date().toISOString())}">
    ${sheetActions(e ? 'Save changes' : 'Add measurement')}
    ${e ? '<button type="button" class="btn-delete" id="shDelete">Delete entry</button>' : ''}`);
  $('#shSave').onclick = () => {
    const obj = e || { id: uid(), type: 'growth' };
    obj.weightKg = $('#gW').value ? +$('#gW').value : undefined;
    obj.heightCm = $('#gH').value ? +$('#gH').value : undefined;
    obj.time = new Date($('#gTime').value).toISOString();
    if (!e) entries.push(obj);
    closeSheet(); persist();
  };
  wireCancelDelete(e);
}

// -- Milestone
function milestoneSheet(e) {
  openSheet(`<h2>${e ? 'Edit milestone' : 'Add milestone'}</h2>
    <label>What happened</label>
    <textarea id="mText" rows="3" placeholder="First smile, first steps…">${e ? escapeHtml(e.text || '') : ''}</textarea>
    <label>Date</label>
    <input type="datetime-local" id="mTime" value="${toLocalInput(e?.time || new Date().toISOString())}">
    ${sheetActions(e ? 'Save changes' : 'Add milestone')}
    ${e ? '<button type="button" class="btn-delete" id="shDelete">Delete entry</button>' : ''}`);
  $('#shSave').onclick = () => {
    const obj = e || { id: uid(), type: 'milestone' };
    obj.text = $('#mText').value.trim();
    obj.time = new Date($('#mTime').value).toISOString();
    if (!e) entries.push(obj);
    closeSheet(); persist();
  };
  wireCancelDelete(e);
}

// -- More menu
function moreSheet() {
  openSheet(`<h2>Add</h2>
    <div class="settings-row"><button id="mGrowth">📏 Measurement</button><button id="mMilestone">⭐ Milestone</button></div>
    <div class="settings-row"><button id="mFeedFull">🍼 Feed (detailed)</button><button id="mSleepFull">🌙 Sleep (with times)</button></div>`);
  $('#mGrowth').onclick = () => growthSheet();
  $('#mMilestone').onclick = () => milestoneSheet();
  $('#mFeedFull').onclick = () => feedSheet();
  $('#mSleepFull').onclick = () => sleepSheet();
}

// -- Settings
function settingsSheet() {
  openSheet(`<h2>Settings</h2>
    <label>Child's name</label>
    <input type="text" id="setName" value="${escapeHtml(settings.name)}">
    <label>Birth date</label>
    <input type="date" id="setBirth" value="${settings.birthdate || ''}">
    <div class="settings-row">
      <button id="setExport">Export backup</button>
      <button id="setImport">Import backup</button>
    </div>
    ${sheetActions('Save settings')}`);
  $('#shSave').onclick = () => {
    settings.name = $('#setName').value.trim();
    settings.birthdate = $('#setBirth').value;
    save('kidtrack.settings', settings);
    closeSheet(); render();
  };
  $('#shCancel').onclick = closeSheet;
  $('#setExport').onclick = () => {
    const blob = new Blob([JSON.stringify({ settings, entries }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'kidtrack-backup-' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
  };
  $('#setImport').onclick = () => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'application/json';
    inp.onchange = () => {
      const f = inp.files[0]; if (!f) return;
      f.text().then(t => {
        try {
          const data = JSON.parse(t);
          if (!Array.isArray(data.entries)) throw 0;
          entries = data.entries;
          if (data.settings) { settings = data.settings; save('kidtrack.settings', settings); }
          closeSheet(); persist();
        } catch { alert('That file is not a KidTrack backup.'); }
      });
    };
    inp.click();
  };
}

function wireCancelDelete(e) {
  $('#shCancel').onclick = closeSheet;
  const del = $('#shDelete');
  if (del) del.onclick = () => {
    if (confirm('Delete this entry?')) {
      entries = entries.filter(x => x.id !== e.id);
      closeSheet(); persist();
    }
  };
}

function openEdit(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  ({ feed: feedSheet, sleep: sleepSheet, diaper: diaperSheet, growth: growthSheet, milestone: milestoneSheet })[e.type](e);
}

// ---------- quick actions ----------
$('#qbFeed').addEventListener('click', () => feedSheet());
$('#qbDiaper').addEventListener('click', () => diaperSheet());
$('#qbSleep').addEventListener('click', () => {
  const s = openSleep();
  if (s) { s.end = new Date().toISOString(); persist(); }
  else { entries.push({ id: uid(), type: 'sleep', time: new Date().toISOString() }); persist(); }
});
$('#qbMore').addEventListener('click', moreSheet);
$('#settingsBtn').addEventListener('click', settingsSheet);
document.querySelectorAll('nav.tabs button').forEach(b =>
  b.addEventListener('click', () => { tab = b.dataset.tab; renderMain(); }));

// live "since" counters
setInterval(renderSince, 30000);

// first run: ask for name/birthdate
render();
if (!settings.name && !entries.length) settingsSheet();

// service worker
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
