<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#D96E34">
<meta name="description" content="Papaya — guia de parentalidade dos 0 aos 2 anos: dicas por idade, pesquisa no guia e tarefas da família. Funciona offline, dados só no teu telemóvel.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="css/estilo.css">
<title>Papaya — Guia dos Pais</title>
</head>
<body>

<header>
  <div>
    <h1 id="cabecalhoNome">Papaya</h1>
    <div class="idade" id="cabecalhoIdade"></div>
  </div>
  <button id="botaoDefinicoes" aria-label="Definições">⚙</button>
</header>

<!-- Cada separador é uma <section>; a navegação mostra/esconde consoante o hash -->
<main>
  <section id="vista-hoje" hidden></section>
  <section id="vista-guia" hidden></section>
  <section id="vista-pesquisa" hidden>
    <div class="caixa-pesquisa">
      <input type="search" id="campoPesquisa" placeholder="Pesquisar no guia (ex: febre, sono...)"
             autocomplete="off" autocapitalize="off" aria-label="Pesquisar no guia">
    </div>
    <div id="resultadosPesquisa"></div>
  </section>
  <section id="vista-tarefas" hidden></section>
  <section id="vista-montessori" hidden></section>
</main>

<nav class="barra-fundo" aria-label="Navegação principal">
  <a href="#hoje" data-sep="hoje"><span class="icone">☀</span>Hoje</a>
  <a href="#guia" data-sep="guia"><span class="icone">📖</span>Guia</a>
  <a href="#pesquisa" data-sep="pesquisa"><span class="icone">🔍</span>Pesquisa</a>
  <a href="#tarefas" data-sep="tarefas"><span class="icone">✓</span>Tarefas</a>
  <a href="#montessori" data-sep="montessori"><span class="icone">🌱</span>Montessori</a>
</nav>

<div class="fundo-folha" id="fundoFolha"></div>
<div class="folha" id="folha" role="dialog" aria-modal="true"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
